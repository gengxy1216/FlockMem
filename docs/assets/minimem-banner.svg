<svg width="1600" height="420" viewBox="0 0 1600 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MiniMem banner</title>
  <desc id="desc">MiniMem wordmark with warm gradient background and multi-agent memory tagline.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF2DA"/>
      <stop offset="45%" stop-color="#FFE1CC"/>
      <stop offset="100%" stop-color="#FFD8E7"/>
    </linearGradient>
    <radialGradient id="blobBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDBA74" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#FDBA74" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#86EFAC" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#86EFAC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F9A8D4" stop-opacity="0.46"/>
      <stop offset="100%" stop-color="#F9A8D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nodeFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="420" fill="url(#bg)"/>
  <circle cx="260" cy="90" r="190" fill="url(#blobBlue)"/>
  <circle cx="760" cy="360" r="290" fill="url(#blobCyan)"/>
  <circle cx="1430" cy="130" r="240" fill="url(#blobGreen)"/>

  <g transform="translate(86,72)">
    <circle cx="128" cy="128" r="74" fill="url(#coreGlow)"/>
    <circle cx="128" cy="128" r="19" fill="url(#nodeFill)"/>

    <g fill="url(#nodeFill)">
      <circle cx="128" cy="54" r="10"/>
      <circle cx="163" cy="62" r="9"/>
      <circle cx="192" cy="84" r="8"/>
      <circle cx="206" cy="116" r="7"/>
      <circle cx="202" cy="151" r="8"/>
      <circle cx="184" cy="181" r="9"/>
      <circle cx="154" cy="199" r="8"/>
      <circle cx="121" cy="204" r="9"/>
      <circle cx="88" cy="196" r="8"/>
      <circle cx="61" cy="175" r="9"/>
      <circle cx="49" cy="143" r="8"/>
      <circle cx="52" cy="109" r="7"/>
      <circle cx="68" cy="79" r="8"/>
      <circle cx="96" cy="59" r="9"/>
    </g>

    <g fill="url(#nodeFill)">
      <circle cx="128" cy="82" r="7"/>
      <circle cx="153" cy="90" r="6"/>
      <circle cx="171" cy="108" r="6"/>
      <circle cx="176" cy="133" r="6"/>
      <circle cx="166" cy="157" r="6"/>
      <circle cx="145" cy="171" r="6"/>
      <circle cx="120" cy="173" r="6"/>
      <circle cx="98" cy="162" r="6"/>
      <circle cx="84" cy="141" r="6"/>
      <circle cx="83" cy="116" r="6"/>
      <circle cx="95" cy="94" r="6"/>
    </g>
  </g>

  <g transform="translate(392,84)" fill="#0B1220" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif">
    <text x="0" y="130" font-size="142" font-weight="600" letter-spacing="1.1">MiniMem</text>
    <line x1="0" y1="176" x2="1080" y2="176" stroke="#0F172A" stroke-width="3" stroke-opacity="0.78"/>
    <text x="0" y="254" font-size="56" font-weight="500">The Memory Infrastructure</text>
    <text x="0" y="322" font-size="44" font-weight="500" letter-spacing="0.4">for Collaborative AI Agents</text>
  </g>
</svg>
